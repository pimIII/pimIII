
<style>
#erd { padding: 8px 0; }
#erd svg { max-width: 100%; }
.mermaid-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; font-size: 12px; color: var(--color-text-secondary); }
.mermaid-legend span { display: flex; align-items: center; gap: 6px; }
.mermaid-legend .dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Diagrama entidade-relacionamento do banco PharmStock</h2>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2860' : '#EEEDFE',
    primaryBorderColor: dark ? '#534AB7' : '#7F77DD',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    edgeLabelBackground: dark ? '#1a1a1a' : '#ffffff',
  },
});
const diagram = `erDiagram
  FORNECEDOR {
    serial id PK
    varchar nome_empresa
    varchar cnpj
    varchar telefone
  }
  FUNCIONARIO {
    serial id_funcionario PK
    varchar nome
    varchar cpf
    varchar cargo
    varchar email
    varchar senha
    date data_admissao
    char ativo
  }
  USUARIO_LOG {
    int id_usuario FK
    timestamp data_login
  }
  CATEGORIA {
    serial id PK
    varchar nome
  }
  PRODUTO {
    serial id PK
    int codigo
    varchar codbarra
    varchar nome
    int id_categoria FK
    int id_fornecedor FK
  }
  PRODUTOS_PRECOS {
    serial id PK
    int id_prod FK
    numeric margem
    numeric custo_bruto
    numeric acrescimo
    numeric custo_liquido
    numeric preco_venda
  }
  LOTE {
    serial id PK
    int id_produto FK
    int numero_lote
    date validade
    numeric quantidade
  }
  MOVIMENTACAO {
    serial id_movimentacao PK
    int id_funcionario FK
    int id_produto FK
    int id_lote FK
    numeric valor_total
    numeric preco_unitario
    int quantidade
    date data_mov
    varchar pagamento
    char tipo_mov
  }

  FORNECEDOR ||--o{ PRODUTO : "fornece"
  CATEGORIA ||--o{ PRODUTO : "classifica"
  PRODUTO ||--o{ PRODUTOS_PRECOS : "tem preco"
  PRODUTO ||--o{ LOTE : "tem lote"
  PRODUTO ||--o{ MOVIMENTACAO : "movimenta"
  LOTE ||--o{ MOVIMENTACAO : "referenciado em"
  FUNCIONARIO ||--o{ MOVIMENTACAO : "realiza"
  FUNCIONARIO ||--o{ USUARIO_LOG : "registra login"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
